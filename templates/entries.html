<!DOCTYPE html>

<style>
    table {
        border-collapse: collapse;
        width: 100%;
    }

    th, td {
        padding: 8px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th {
        background: #f5f5f5;
    }

    .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;

        padding: 8px 12px;
        margin-bottom: 10px;

        background: #2d6cdf;
        color: white;

        text-decoration: none;
        border: none;

        font: inherit;
        font-size: 14px;
        line-height: 1;

        border-radius: 4px;

        box-sizing: border-box;
        cursor: pointer;
    }

    .button:hover {
        background: #1f4fb2;
    }
</style>

<html>
<head>
    <title>Travel Log</title>
</head>
<body>

<h1>Travel Log</h1>

<a href="/add" class="button">+ Add Entry</a>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Place</th>
            <th>Comment</th>
            <th></th>
            <th></th>
        </tr>
    </thead>

    <tbody>
        {{range .}}
        <tr>
            <td>{{.VisitedAt}}</td>
            <td>{{.Place}}</td>
            <td>{{.Comment}}</td>
            <td>
                <a href="/edit?id={{.ID}}" class="button">Edit</a>
            </td>
            <td>
                <form method="POST" action="/delete" style="display:inline;">
                    <input type="hidden" name="id" value="{{.ID}}">
                    <button type="submit" class="button">Delete</button>
                </form>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>

</body>
</html>
